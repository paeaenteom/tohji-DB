*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#04040a;--card:#0a0a14;--card-h:#10101c;--bdr:#181828;--tx:#d0d0de;--dim:#5a5a78;--acc:#b0b0c8;--purple:#8070b0;--green:#70a898;--orange:#c89060;--gold:#b8a878;--ghost:#282838;--silver:linear-gradient(135deg,#c8c8e0,#8888a8)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;line-height:1.55;min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.wrap{max-width:860px;margin:0 auto;padding:clamp(16px,4vw,40px) clamp(10px,3vw,20px) 80px}
.hd{text-align:center;padding:clamp(28px,6vw,56px) 0 clamp(20px,4vw,40px);position:relative}
.hd::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:48px;height:2px;background:var(--silver)}
.hd h1{font-family:'DM Mono',monospace;font-size:clamp(2.2rem,9vw,4rem);font-weight:500;letter-spacing:-3px;background:linear-gradient(160deg,#e8e8f0 20%,#6868a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd small{display:block;margin-top:8px;font-family:'DM Mono',monospace;font-size:clamp(9px,2.2vw,12px);color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.leg{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;margin:16px 0 clamp(16px,3vw,28px);font-size:clamp(9px,2.2vw,11px);color:var(--dim)}
.leg i{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.st{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,1.5vw,10px);margin-bottom:clamp(20px,4vw,36px)}
.st>div{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:clamp(10px,2.5vw,18px) 4px;text-align:center}
.st b{display:block;font-family:'DM Mono',monospace;font-size:clamp(16px,4vw,26px);color:var(--acc)}
.st span{font-size:clamp(7px,1.8vw,10px);color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.yr{margin-bottom:clamp(28px,5vw,44px)}
.yr-h{font-family:'DM Mono',monospace;font-size:clamp(28px,7vw,48px);font-weight:500;color:transparent;-webkit-text-stroke:1px #202038;letter-spacing:-2px;position:sticky;top:0;z-index:10;background:var(--bg);padding:6px 0;border-bottom:1px solid var(--bdr);margin-bottom:clamp(8px,2vw,14px)}
.cd{background:var(--card);border:1px solid var(--bdr);border-radius:clamp(8px,2vw,12px);margin-bottom:clamp(6px,1.5vw,10px);overflow:hidden;transition:border-color .2s}
.cd.on{border-color:var(--acc)}
.cd.dl{border-left:3px solid #a06070}
.cd.sc{border-left:3px solid var(--orange)}
.cd.un{border-left:3px solid var(--ghost)}
.ch{display:flex;align-items:center;gap:clamp(10px,2.5vw,16px);padding:clamp(8px,2vw,14px) clamp(10px,2.5vw,18px);cursor:pointer;user-select:none}
.ch:active{background:var(--card-h)}
@media(min-width:700px){.ch:hover{background:var(--card-h)}}
.ar{width:clamp(42px,11vw,56px);height:clamp(42px,11vw,56px);border-radius:clamp(5px,1.2vw,8px);object-fit:cover;flex-shrink:0;aspect-ratio:1/1;background:var(--card-h)}
.ic{width:clamp(42px,11vw,56px);height:clamp(42px,11vw,56px);border-radius:clamp(5px,1.2vw,8px);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4vw,22px);aspect-ratio:1/1}
.ic-sc{background:linear-gradient(135deg,#8a6030,#6a4820);color:#d8c090}
.ic-dl{background:linear-gradient(135deg,#2a1828,#1a0e18);color:#a06070}
.ic-un{background:#0c0c18;color:var(--ghost)}
.ic-lv{background:linear-gradient(135deg,#1a1430,#100c20);color:var(--purple)}
.ic-ft{background:#080e14;color:var(--green)}
.ci{flex:1;min-width:0;overflow:hidden}
.ct{font-weight:600;font-size:clamp(12px,3.2vw,15px);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cm{font-size:clamp(9px,2.3vw,12px);color:var(--dim);display:flex;flex-wrap:wrap;gap:3px 6px;align-items:center;margin-top:2px}
.tg{font-size:clamp(7px,1.8vw,10px);padding:1px clamp(4px,1vw,7px);border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.tg-al{background:linear-gradient(135deg,#4040608a,#2828408a);color:#c0c0e0}.tg-ep{background:#20203a;color:var(--purple)}
.tg-sg{background:#0c1820;color:var(--green)}.tg-mx{background:#1a1810;color:var(--gold)}
.tg-ft{background:#0a1418;color:var(--green)}.tg-dl{background:#201018;color:#a06070}
.tg-sc{background:#1a1408;color:var(--orange)}.tg-un{background:#0c0c14;color:#404058}
.tg-lv{background:#120e22;color:var(--purple)}.tg-mb{background:#181410;color:var(--gold)}
.chv{width:clamp(14px,3.5vw,20px);height:clamp(14px,3.5vw,20px);flex-shrink:0;transition:transform .3s;color:var(--dim)}
.cd.on .chv{transform:rotate(180deg)}
.cb{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.cbi{padding:0 clamp(10px,2.5vw,18px) clamp(10px,2.5vw,16px);border-top:1px solid var(--bdr)}
.ds{font-size:clamp(11px,2.8vw,13px);color:var(--dim);margin:clamp(8px,2vw,14px) 0;line-height:1.65}
.tl{list-style:none}
.tl li{display:flex;align-items:flex-start;gap:clamp(6px,1.5vw,10px);padding:clamp(5px,1.2vw,8px) 0;border-bottom:1px solid #0e0e1c;font-size:clamp(11px,2.8vw,13px)}
.tl li:last-child{border-bottom:none}
.tn{font-family:'DM Mono',monospace;font-size:clamp(9px,2.2vw,11px);color:var(--dim);width:clamp(16px,4vw,22px);text-align:right;flex-shrink:0;margin-top:1px}
.nm{flex:1;min-width:0;word-break:break-word}.nm.sk{text-decoration:line-through;color:#a06070;opacity:.55}
.ft{display:block;font-size:clamp(8px,2vw,10px);color:var(--dim);margin-top:1px;opacity:.75}
.ts{font-size:clamp(7px,1.6vw,9px);padding:1px clamp(3px,.8vw,5px);border-radius:3px;flex-shrink:0;margin-top:2px;white-space:nowrap}
.ts-d{background:#1a0e18;color:#a06070}.ts-s{background:#1a1408;color:var(--orange)}
@media(max-width:380px){.st{grid-template-columns:repeat(2,1fr)}}
/* ── filter bar ── */
.fb{display:flex;gap:clamp(5px,1.2vw,8px);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:clamp(10px,2.5vw,16px) 0;position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--bdr);margin-bottom:clamp(16px,3vw,24px)}
.fb::-webkit-scrollbar{display:none}
.fb button{flex-shrink:0;font-family:'Noto Sans KR',sans-serif;font-size:clamp(10px,2.5vw,13px);font-weight:600;padding:clamp(5px,1.3vw,8px) clamp(10px,2.5vw,16px);border-radius:100px;border:1px solid var(--bdr);background:var(--card);color:var(--dim);cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fb button:active{transform:scale(.95)}
.fb button.on{background:linear-gradient(135deg,#a0a0c0,#7070a0);color:#08080e;border-color:#8888a8}
.fb button .cnt{font-family:'DM Mono',monospace;font-size:clamp(8px,2vw,10px);margin-left:4px;opacity:.7}
/* ── filter transitions ── */
.yr.hide{display:none}
.cd.fhide{display:none}
.no-result{text-align:center;padding:40px 20px;color:var(--dim);font-size:clamp(12px,3vw,14px)}
/* ── webhook send button ── */
.wh-send{background:none;border:none;cursor:pointer;font-size:14px;padding:4px 6px;opacity:.25;transition:opacity .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.wh-send:hover{opacity:.8}
.wh-send:active{transform:scale(.9)}
.wh-modal{display:none;position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:16px}
.wh-modal.show{display:flex}
.wh-box{background:#0c0c18;border:1px solid #202038;border-radius:14px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:clamp(18px,4vw,28px)}
.wh-box h3{font-family:'DM Mono',monospace;font-size:15px;color:#c0c0e0;margin-bottom:14px}
.wh-box label{font-size:11px;color:#5a5a78;display:block;margin-bottom:4px}
.wh-box input,.wh-box textarea{width:100%;background:#08080e;border:1px solid #202038;border-radius:6px;padding:10px 12px;color:#d0d0de;font-size:13px;font-family:'DM Mono',monospace;margin-bottom:12px;resize:vertical}
.wh-box input:focus,.wh-box textarea:focus{outline:none;border-color:#7070a0}
.wh-preview{background:#2f3136;border-radius:8px;padding:14px;margin-bottom:14px;border-left:3px solid #8070b0}
.wh-preview .wh-pv-title{font-weight:700;color:#fff;font-size:14px;margin-bottom:4px}
.wh-preview .wh-pv-desc{font-size:12px;color:#b9bbbe;margin-bottom:6px;line-height:1.5}
.wh-preview .wh-pv-img{width:60px;height:60px;border-radius:6px;float:right;margin-left:8px;object-fit:cover}
.wh-preview .wh-pv-footer{font-size:10px;color:#72767d;margin-top:8px;clear:both}
.wh-btn{padding:10px 20px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .2s;font-family:'Noto Sans KR',sans-serif}
.wh-btn-send{background:linear-gradient(135deg,#5865F2,#4752c4);color:#fff;margin-right:8px}
.wh-btn-cancel{background:#2f2f40;color:#b0b0c8}
.wh-btn:hover{opacity:.85}
.wh-btn:disabled{opacity:.4;cursor:not-allowed}
.wh-ok{color:#70a898;font-size:12px;margin-top:8px;display:none}
.wh-err{color:#a06070;font-size:12px;margin-top:8px;display:none}
.wh-set-btn{position:fixed;bottom:24px;right:80px;z-index:999;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#5865F2,#4752c4);border:none;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .2s}
.wh-set-btn:hover{transform:scale(1.1)}

// ── Build DOM ──
const c=document.getElementById('D');
D.forEach(y=>{
  const s=document.createElement('div');

  s.innerHTML='<div class="yr-h">'+y.y+'</div>';
  y.r.forEach(r=>{
    let cl='cd';
    if(r.tc==='dl')cl+=' dl';
    else if(r.tc==='sc')cl+=' sc';
    else if(r.tc==='un'||r.tc==='lv')cl+=' un';
    let art='';
    if(r.a&&A[r.a])art='<img class="ar" src="'+A[r.a]+'" alt="" loading="lazy">';
    else{let ic='ic ';if(r.ic==='sc')ic+='ic-sc';else if(r.ic==='dl')ic+='ic-dl';else if(r.ic==='un')ic+='ic-un';else if(r.ic==='lv')ic+='ic-lv';else ic+='ic-ft';art='<div class="'+ic+'">'+(r.ix||'♫')+'</div>';}
    let bd='',has=r.d||(r.tr&&r.tr.length);
    if(has){let dd=r.d?'<div class="ds">'+r.d+'</div>':'';let tl='';if(r.tr&&r.tr.length){tl='<ol class="tl">'+r.tr.map(t=>{let nc=t.s==='d'?'nm sk':'nm';let st='';if(t.s==='d')st='<span class="ts ts-d">삭제</span>';else if(t.s==='s')st='<span class="ts ts-s">SC</span>';let ft=t.f?'<span class="ft">'+t.f+'</span>':'';return'<li><span class="tn">'+t.n+'</span><span class="'+nc+'">'+t.v+ft+'</span>'+st+'</li>';}).join('')+'</ol>';}bd='<div class="cb"><div class="cbi">'+dd+tl+'</div></div>';}

// ── Accordion (event delegation) ──
c.addEventListener('click',function(e){
  if(e.target.closest('.wh-send'))return;
  const ch=e.target.closest('.ch');if(!ch)return;
  const cd=ch.parentElement;const cb=cd.querySelector('.cb');if(!cb)return;
  const on=cd.classList.contains('on');
  cd.parentElement.querySelectorAll('.cd.on').forEach(x=>{if(x!==cd){x.classList.remove('on');x.querySelector('.cb').style.maxHeight='0';}});
  if(on){cd.classList.remove('on');cb.style.maxHeight='0';}
  else{cd.classList.add('on');cb.style.maxHeight=cb.scrollHeight+'px';}
});

// ── Filter buttons ──
const fb=document.getElementById('FB');
const btns=fb.querySelectorAll('button');

// Add counts to each button
const allCards=c.querySelectorAll('.cd[data-cat]');
btns.forEach(btn=>{
  const f=btn.getAttribute('data-f');
  if(f==='all'){
    btn.innerHTML=btn.textContent+'<span class="cnt">'+allCards.length+'</span>';
  }else{
    const cats=f.split(',');
    let count=0;
    allCards.forEach(cd=>{if(cats.includes(cd.getAttribute('data-cat')))count++;});
    btn.innerHTML=btn.textContent+'<span class="cnt">'+count+'</span>';
  }
});

fb.addEventListener('click',function(e){
  const btn=e.target.closest('button');if(!btn)return;
  btns.forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const f=btn.getAttribute('data-f');
  const cats=f==='all'?null:f.split(',');
  // close all open cards
  c.querySelectorAll('.cd.on').forEach(cd=>{cd.classList.remove('on');const cb=cd.querySelector('.cb');if(cb)cb.style.maxHeight='0';});
  // filter cards
  allCards.forEach(cd=>{
    if(!cats||cats.includes(cd.getAttribute('data-cat'))){cd.classList.remove('fhide');}
    else{cd.classList.add('fhide');}
  });
  // hide empty year sections
  c.querySelectorAll('.yr').forEach(yr=>{
    const visible=yr.querySelectorAll('.cd[data-cat]:not(.fhide)');
    yr.classList.toggle('hide',visible.length===0);
  });
  // scroll to top of discography
  c.scrollIntoView({behavior:'smooth',block:'start'});
});

(function(){
const panelCSS=document.createElement('style');
panelCSS.textContent=`

const fb2=document.createElement('button');
fb2.className='upd-btn';fb2.textContent='🔄';fb2.title='신곡 업데이트 확인';
document.body.appendChild(fb2);

const modal=document.createElement('div');modal.className='upd-modal';
modal.innerHTML=`<div class="upd-box" style="position:relative">

<div id="upd-res" style="margin-top:12px"></div>

modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show');});

// collect existing track names
function getExisting(){
  const ex=new Set();
  D.forEach(yr=>yr.r.forEach(r=>{ex.add(r.t.toLowerCase());r.tr.forEach(t=>ex.add(t.v.toLowerCase()));}));
  return ex;
}

document.getElementById('upd-go').addEventListener('click',async function(){
  const log=document.getElementById('upd-log');
  const res=document.getElementById('upd-res');
  this.disabled=true;this.textContent='검색 중...';
  log.innerHTML='';res.innerHTML='';
  const existing=getExisting();

  try{
    log.innerHTML='🟢 Spotify 확인 중...\n';
    const sp=await fetch('/api/update');
    if(!sp.ok)throw new Error('API 응답 오류 '+sp.status);
    const data=await sp.json();
    if(data.error){log.innerHTML+=`<span class="err">❌ ${data.error}</span>\n`;this.disabled=false;this.textContent='다시 확인';return;}

    const newTracks=[];
    // Spotify results
    if(data.spotify){
      data.spotify.forEach(item=>{
        const name=item.name.toLowerCase();
        if(!existing.has(name)){
          newTracks.push({title:item.name,artist:item.artists,date:item.date,type:item.type,artwork:item.artwork,src:'spotify'});
        }
      });
    }
    // SoundCloud results
    if(data.soundcloud){
      data.soundcloud.forEach(item=>{
        const name=item.name.toLowerCase();
        if(!existing.has(name)){
          newTracks.push({title:item.name,date:item.date,type:'sc',artwork:item.artwork,src:'soundcloud'});
        }
      });
    }

    log.innerHTML+=`✅ Spotify: ${data.spotify?.length||0}개 릴리즈 확인\n`;
    log.innerHTML+=`✅ SoundCloud: ${data.soundcloud?.length||0}개 트랙 확인\n`;

    if(!newTracks.length){
      log.innerHTML+='<span class="found">✨ 새 곡 없음 — 최신 상태입니다</span>\n';
    }else{
      log.innerHTML+=`<span class="found">🎵 ${newTracks.length}개 신곡 발견!</span>\n`;
      newTracks.forEach(t=>{
        const card=document.createElement('div');card.className='upd-card';
        card.innerHTML=`${t.artwork?`<img src="${t.artwork}" onerror="this.style.display='none'">`:''}
        <div class="upd-card-info"><b>${t.title}</b><small>${t.date||'?'} · ${t.artist||'Tohji'} · ${t.src}</small></div>`;
        res.appendChild(card);
      });
    }
  }catch(e){
    log.innerHTML+=`<span class="err">❌ ${e.message}\n로컬에서는 작동하지 않습니다. Vercel 배포 후 사용해주세요.</span>`;
  }
  this.disabled=false;this.textContent='다시 확인';
});
})();

// ── DISCORD WEBHOOK SYSTEM ──
(function(){
// Settings button
const setBtn=document.createElement('button');
setBtn.className='wh-set-btn';setBtn.textContent='🎮';setBtn.title='Discord 웹훅 설정';
document.body.appendChild(setBtn);

// Settings modal
const setModal=document.createElement('div');setModal.className='wh-modal';
setModal.innerHTML=`<div class="wh-box">
<h3>🎮 Discord 웹훅 설정</h3>
<label>Webhook URL</label>
<input type="url" id="wh-url" placeholder="https://discord.com/api/webhooks/..." value="">
<label>Bot 이름 (선택)</label>
<input type="text" id="wh-name" placeholder="Tohji Disco" value="">
<label>Embed 색상 (Hex)</label>
<input type="text" id="wh-color" placeholder="#8070b0" value="#8070b0">
<div style="display:flex;gap:8px;margin-top:4px">
<button class="wh-btn wh-btn-send" id="wh-save">저장</button>
<button class="wh-btn wh-btn-cancel" id="wh-close">닫기</button>
</div>
<div class="wh-ok" id="wh-saved-ok">✅ 저장됨</div>
</div>`;
document.body.appendChild(setModal);

setBtn.addEventListener('click',()=>{
  setModal.classList.add('show');
  const s=JSON.parse(localStorage.getItem('wh_settings')||'{}');
  document.getElementById('wh-url').value=s.url||'';
  document.getElementById('wh-name').value=s.name||'Tohji Disco';
  document.getElementById('wh-color').value=s.color||'#8070b0';
});
setModal.addEventListener('click',e=>{if(e.target===setModal)setModal.classList.remove('show');});
document.getElementById('wh-close').addEventListener('click',()=>setModal.classList.remove('show'));
document.getElementById('wh-save').addEventListener('click',()=>{
  const s={url:document.getElementById('wh-url').value.trim(),name:document.getElementById('wh-name').value.trim()||'Tohji Disco',color:document.getElementById('wh-color').value.trim()||'#8070b0'};
  localStorage.setItem('wh_settings',JSON.stringify(s));
  const ok=document.getElementById('wh-saved-ok');ok.style.display='block';setTimeout(()=>ok.style.display='none',2000);
});

// Send modal
const sendModal=document.createElement('div');sendModal.className='wh-modal';
sendModal.innerHTML=`<div class="wh-box">
<h3>📤 Discord로 보내기</h3>
<div class="wh-preview" id="wh-pv"></div>
<label>추가 메시지 (선택)</label>
<textarea id="wh-msg" rows="2" placeholder="메모나 코멘트..."></textarea>
<div style="display:flex;gap:8px">
<button class="wh-btn wh-btn-send" id="wh-do-send">전송</button>
<button class="wh-btn wh-btn-cancel" id="wh-do-cancel">취소</button>
</div>
<div class="wh-ok" id="wh-send-ok">✅ 전송 완료!</div>
<div class="wh-err" id="wh-send-err"></div>
</div>`;
document.body.appendChild(sendModal);

sendModal.addEventListener('click',e=>{if(e.target===sendModal)sendModal.classList.remove('show');});
document.getElementById('wh-do-cancel').addEventListener('click',()=>sendModal.classList.remove('show'));

let currentEmbed=null;

// Handle 📤 button clicks (prevent accordion toggle)
document.getElementById('D').addEventListener('click',function(e){
  const btn=e.target.closest('.wh-send');
  if(!btn)return;
  e.stopPropagation();
  
  const s=JSON.parse(localStorage.getItem('wh_settings')||'{}');
  if(!s.url){setModal.classList.add('show');return;}
  
  const t=decodeURIComponent(btn.dataset.t);
  const m=decodeURIComponent(btn.dataset.m);
  const d=decodeURIComponent(btn.dataset.d||'');
  const tc=btn.dataset.tc;
  const img=btn.dataset.img;
  const tr=decodeURIComponent(btn.dataset.tr||'');
  
  // Category labels
  const catMap={al:'앨범',ep:'EP',mx:'믹스테이프',sg:'싱글',mb:'Mall Boyz',ft:'피처링',sc:'사클한정',dl:'삭제',un:'미발매',lv:'라이브'};
  const catLabel=catMap[tc]||tc;
  
  // Build preview
  const pv=document.getElementById('wh-pv');
  pv.innerHTML=`${img?'<img class="wh-pv-img" src="'+img+'" onerror="this.style.display=\'none\'">':''}
  <div class="wh-pv-title">${t}</div>
  <div class="wh-pv-desc">${catLabel} · ${m}${d?'\n'+d:''}${tr?'\n\n'+tr.replace(/\n/g,'<br>'):''}</div>
  <div class="wh-pv-footer">Tohji Complete Discography</div>`;
  
  // Build Discord embed
  const colorInt=parseInt((s.color||'#8070b0').replace('#',''),16);
  currentEmbed={
    embeds:[{
      title:t,
      description:`**${catLabel}** · ${m}${d?'\n'+d:''}${tr?'\n```\n'+tr+'\n```':''}`,
      color:colorInt,
      thumbnail:img?{url:img}:undefined,
      footer:{text:'Tohji Complete Discography'}
    }]
  };
  if(s.name)currentEmbed.username=s.name;
  
  document.getElementById('wh-msg').value='';
  document.getElementById('wh-send-ok').style.display='none';
  document.getElementById('wh-send-err').style.display='none';
  sendModal.classList.add('show');
});

// Send webhook
document.getElementById('wh-do-send').addEventListener('click',async function(){
  const s=JSON.parse(localStorage.getItem('wh_settings')||'{}');
  if(!s.url||!currentEmbed)return;
  
  this.disabled=true;this.textContent='전송 중...';
  const msg=document.getElementById('wh-msg').value.trim();
  const payload={...currentEmbed};
  if(msg)payload.content=msg;
  
  try{
    const r=await fetch(s.url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.ok||r.status===204){
      document.getElementById('wh-send-ok').style.display='block';
      document.getElementById('wh-send-err').style.display='none';
      setTimeout(()=>sendModal.classList.remove('show'),1500);
    }else{
      const t=await r.text();
      document.getElementById('wh-send-err').textContent='❌ '+r.status+': '+t.substring(0,100);
      document.getElementById('wh-send-err').style.display='block';
    }
  }catch(e){
    document.getElementById('wh-send-err').textContent='❌ '+e.message;
    document.getElementById('wh-send-err').style.display='block';
  }
  this.disabled=false;this.textContent='전송';
});
})();
</script>
